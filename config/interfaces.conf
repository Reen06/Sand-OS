# Roku-E8C3 — interface role mapping
#
# Resolved at apply-time by scripts/sand-resolve-ifaces. Roles are matched by
# kernel driver (most stable across reboots) or by MAC address. To swap roles
# (e.g. make the USB adapter the access point), edit this file and re-run
# `sand-apply`.
#
# Match syntax — comma-separated candidates, first match wins per role:
#   driver:<name>   match interface kernel driver
#   mac:<addr>      match interface MAC address (lower-case, colon-separated)
#   name:<ifname>   match interface name literally
#
# Default assignment:
#   AP       = onboard Broadcom radio  — reliable AP mode, recovery anchor
#   UPSTREAM = TP-Link Archer T2U Plus — solid client mode, adds 5 GHz upstream

AP_MATCH=driver:brcmfmac
UPSTREAM_MATCH=driver:rtw88_8821au,driver:rtl8821au,driver:8821au,driver:rtl8xxxu

# When only one WiFi radio is present, force that radio to this role so the
# device always stays reachable for recovery. Keep this set to 'ap'.
SINGLE_RADIO_ROLE=ap
