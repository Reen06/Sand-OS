<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0f1419">
  <title>Roku-E8C3</title>
  <link rel="preload" href="/assets/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <a class="skip-link" href="#view">Skip to main content</a>

  <!-- Boot splash, shown until the app decides auth vs dashboard -->
  <div id="boot" class="boot">
    <div class="boot__mark">Roku-E8C3</div>
    <div class="spinner spinner--lg" role="status" aria-label="Loading"></div>
  </div>

  <!-- Login / first-run setup, rendered by js/pages/auth.js -->
  <div id="auth" class="auth" hidden></div>

  <!-- Dashboard shell -->
  <div id="app" class="app" hidden>
    <aside id="sidebar" class="sidebar" aria-label="Primary navigation">
      <div class="sidebar__brand">
        <span class="sidebar__logo" data-icon="router" aria-hidden="true"></span>
        <span class="sidebar__name">Roku-E8C3</span>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="sidebar__foot">
        <button id="btn-logout" class="btn btn--ghost btn--sm btn--block" type="button">
          <span data-icon="power" aria-hidden="true"></span> Sign out
        </button>
      </div>
    </aside>
    <div id="scrim" class="scrim" hidden></div>

    <div class="main">
      <header class="topbar">
        <button id="btn-menu" class="icon-btn topbar__menu" type="button" aria-label="Open navigation">
          <span data-icon="menu" aria-hidden="true"></span>
        </button>
        <h1 id="page-title" class="topbar__title">Overview</h1>
        <div id="topbar-status" class="topbar__status"></div>
      </header>
      <main id="view" class="view" tabindex="-1"></main>
    </div>
  </div>

  <div id="toasts" class="toasts" aria-live="polite" aria-atomic="false"></div>
  <div id="modal-root"></div>

  <script type="module" src="/js/app.js"></script>
  <noscript>
    <div style="padding:2rem;text-align:center">
      The Roku-E8C3 dashboard requires JavaScript.
    </div>
  </noscript>
</body>
</html>
